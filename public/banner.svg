<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#08080d"/>
      <stop offset="50%" stop-color="#0f0a1a"/>
      <stop offset="100%" stop-color="#08080d"/>
    </linearGradient>
    <linearGradient id="v1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </linearGradient>
    <linearGradient id="glow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bg)"/>

  <!-- Glow effect -->
  <ellipse cx="600" cy="180" rx="400" ry="200" fill="url(#glow)"/>

  <!-- Grid lines -->
  <g stroke="#8b5cf6" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="80" x2="1200" y2="80"/>
    <line x1="0" y1="160" x2="1200" y2="160"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="320" x2="1200" y2="320"/>
    <line x1="200" y1="0" x2="200" y2="400"/>
    <line x1="400" y1="0" x2="400" y2="400"/>
    <line x1="600" y1="0" x2="600" y2="400"/>
    <line x1="800" y1="0" x2="800" y2="400"/>
    <line x1="1000" y1="0" x2="1000" y2="400"/>
  </g>

  <!-- Logo icon -->
  <g transform="translate(420, 80)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="url(#v1)"/>
    <path d="M32 8L20 30h8L24 48l16-22h-8L32 8z" fill="white" opacity="0.95"/>
  </g>

  <!-- Title -->
  <text x="490" y="122" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="36" font-weight="800" fill="white">SQL Agent</text>

  <!-- Subtitle -->
  <text x="420" y="170" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="16" fill="#8b5cf6">Self-Debugging</text>
  <text x="600" y="170" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="16" fill="#4b5563">  &#183;  </text>
  <text x="630" y="170" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="16" fill="#8b5cf6">GEPA Prompt Evolution</text>
  <text x="885" y="170" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="16" fill="#4b5563">  &#183;  </text>
  <text x="915" y="170" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="16" fill="#8b5cf6">RL Environment</text>

  <!-- Tagline -->
  <text x="600" y="220" font-family="ui-monospace, 'SF Mono', Consolas, monospace" font-size="14" fill="#6b7280" text-anchor="middle">An AI SQL agent that gets measurably better over time — without retraining the model</text>

  <!-- Feature pills -->
  <g transform="translate(215, 260)">
    <rect x="0" y="0" width="130" height="32" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <text x="65" y="21" font-family="ui-monospace, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Self-Debug Loop</text>

    <rect x="150" y="0" width="155" height="32" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <text x="227" y="21" font-family="ui-monospace, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Prompt Evolution</text>

    <rect x="325" y="0" width="130" height="32" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <text x="390" y="21" font-family="ui-monospace, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">LinUCB Bandit</text>

    <rect x="475" y="0" width="140" height="32" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <text x="545" y="21" font-family="ui-monospace, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Multi-DB Support</text>

    <rect x="635" y="0" width="130" height="32" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.3"/>
    <text x="700" y="21" font-family="ui-monospace, monospace" font-size="11" fill="#c4b5fd" text-anchor="middle">Light/Dark Mode</text>
  </g>

  <!-- Bottom line -->
  <text x="600" y="340" font-family="ui-monospace, monospace" font-size="12" fill="#4b5563" text-anchor="middle">Pure prompt + context engineering. No fine-tuning. No model weights.</text>

  <!-- Corner accents -->
  <circle cx="100" cy="100" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1100" cy="100" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="100" cy="300" r="2" fill="#8b5cf6" opacity="0.3"/>
  <circle cx="1100" cy="300" r="2" fill="#8b5cf6" opacity="0.3"/>
</svg>
